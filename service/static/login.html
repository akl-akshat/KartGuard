<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>ReturnGuard — Sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20,400,0,0&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/ui/app.css">
<style>
  body{display:grid;place-items:center;min-height:100vh;
    background:linear-gradient(160deg,#eef2fb 0%, #f7f9fd 45%, #eef6f2 100%)}
  .login{width:min(430px,94vw);background:#fff;border:1px solid var(--line);border-radius:22px;
    box-shadow:0 24px 70px -30px rgba(20,30,55,.35);padding:34px 34px 28px}
  .lg-brand{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:6px}
  .lg-brand .mark{width:52px;height:52px;border-radius:14px;background:var(--brand);color:#fff;
    display:grid;place-items:center;font-family:var(--display);font-weight:800;font-size:24px}
  .lg-brand h1{font-size:21px}
  .lg-brand p{margin:0;color:var(--muted);font-size:13px;text-align:center}
  .roles{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin:22px 0 16px}
  .role{border:1.5px solid var(--line-2);border-radius:12px;padding:10px 4px;text-align:center;cursor:pointer;
    background:#fff;transition:.15s;color:var(--muted)}
  .role .msym{font-size:22px}
  .role .rl{display:block;font-size:11.5px;font-weight:600;margin-top:4px}
  .role.on{border-color:var(--brand);background:var(--brand-soft);color:var(--brand)}
  .hintline{font-size:12px;color:var(--faint);margin-top:8px;min-height:16px}
  .lg-foot{margin-top:18px;text-align:center;font-size:12px;color:var(--faint)}
  .lg-foot a{color:var(--brand);font-weight:600}
</style>
</head>
<body>
  <div class="login">
    <div class="lg-brand">
      <div class="mark">R</div>
      <h1>Welcome to ReturnGuard</h1>
      <p>The central refund &amp; returns platform.<br>Sign in to your workspace.</p>
    </div>

    <div class="roles" id="roles">
      <div class="role on" data-role="customer"><span class="msym">person</span><span class="rl">Customer</span></div>
      <div class="role" data-role="client"><span class="msym">storefront</span><span class="rl">Client</span></div>
      <div class="role" data-role="rep"><span class="msym">support_agent</span><span class="rl">Rep</span></div>
      <div class="role" data-role="admin"><span class="msym">shield_person</span><span class="rl">Admin</span></div>
    </div>

    <div class="field">
      <label id="idLabel">Your account (demo — phone number is your ID)</label>
      <select id="ident" class="input"></select>
      <input id="loginId" class="input" style="display:none" autocomplete="username" placeholder="Login ID">
    </div>
    <div class="field" id="pwField" style="display:none;margin-top:10px">
      <label>Password</label>
      <input id="pw" class="input" type="password" autocomplete="current-password" placeholder="••••••••">
    </div>
    <div class="hintline" id="hint"></div>

    <button class="btn btn-primary" style="width:100%;padding:12px;margin-top:8px;font-size:14.5px" onclick="login()">
      Log in <span class="msym">arrow_forward</span>
    </button>

    <div class="lg-foot">Demo sign-in: pick an identity, no password. · <a href="/marketing">About ReturnGuard</a></div>
  </div>

<script>
const $=s=>document.querySelector(s);
const api=(u,o)=>fetch(u,o).then(r=>{ if(!r.ok) throw new Error(r.status); return r.json(); });
let role='customer', data={customers:[], companies:[], reps:{}};

async function boot(){
  try{
    const [users, companies]=await Promise.all([api('/api/platform/users'), api('/api/companies')]);
    data.customers=users; data.companies=companies;
  }catch(e){}
  render();
}
document.getElementById('roles').addEventListener('click', e=>{
  const el=e.target.closest('.role'); if(!el) return;
  document.querySelectorAll('.role').forEach(r=>r.classList.toggle('on', r===el));
  role=el.dataset.role; render();
});
async function render(){
  const sel=$('#ident'), idIn=$('#loginId'), pwF=$('#pwField'), lb=$('#idLabel'), hint=$('#hint');
  const staff = role!=='customer';
  sel.style.display = staff ? 'none' : '';
  idIn.style.display = staff ? '' : 'none';
  pwF.style.display = staff ? '' : 'none';
  if(role==='customer'){
    lb.textContent='Your account (demo — phone number is your ID)';
    sel.innerHTML=data.customers.map(u=>`<option value="${u.id}">${u.name} · 📱 ${u.phone}</option>`).join('');
    hint.textContent='One login for all your brands — Zomato, Swiggy, Amazon and more.';
  } else if(role==='client'){
    lb.textContent='Company login ID';
    idIn.placeholder='e.g. swiggy';
    hint.textContent='Issued by the platform admin when your company was registered. Demo: swiggy / swiggy123.';
  } else if(role==='rep'){
    lb.textContent='Employee login ID';
    idIn.placeholder='e.g. arjun';
    hint.textContent='Issued by your company. Demo: arjun / rep123.';
  } else {
    lb.textContent='Admin login ID';
    idIn.placeholder='admin';
    hint.textContent='Demo: admin / admin123.';
  }
}
async function login(){
  const staff = role!=='customer';
  const id = staff ? $('#loginId').value.trim() : $('#ident').value;
  const password = staff ? $('#pw').value : '';
  if(staff && (!id || !password)){ $('#hint').textContent='Enter your login ID and password.'; return; }
  try{
    const out=await api('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({role, id, password})});
    const url = role==='customer' ? `${out.redirect}?u=${encodeURIComponent(out.id)}`
              : role==='client'   ? `${out.redirect}?co=${encodeURIComponent(out.id)}`
              : role==='rep'      ? `${out.redirect}?rep=${encodeURIComponent(out.id)}`
              : out.redirect;
    location.href=url;
  }catch(e){ $('#hint').textContent = staff ? 'Invalid ID or password.' : 'Could not sign in — is the identity valid?'; }
}
document.addEventListener('keydown',e=>{ if(e.key==='Enter') login(); });
boot();
</script>
</body>
</html>
